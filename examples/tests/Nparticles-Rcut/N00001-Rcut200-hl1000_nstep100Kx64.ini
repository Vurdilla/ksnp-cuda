; GCPS-v7.1 input parameters

[Searcher]
nParticles = 1	; number of particles, default = 1
chemosensitivityModel = 1	; chemosensitivity model: 0 - ~ gradient of SC, 1 - gradient of log(SC)
V0 = 1	; searcher velocity
keepV0Constant = 1	; use equations with constant V0
rotationalDiffusion = 1	; rotationbal diffusion coefficient
Rscent = 0.01	; scent raduis
beta0 = 1.0	; scent strength
betaDecayTime = 10.0	; beta relaxation to beta0
chiRot = 0.20	; 
chiTrans = 0.010	; 
SC0 = 0.001	; scent noise level (for model 1)

[Pairwise]
PPepsilon = 1.0	; 
PPsigma =	0.01	; 

[System]
boxSize = 16.0	; the grid on which the concentration shall be calculated is 2L-by-2L
boundaryType = 1	; boundary: 0 - square, 1 - circle
scentDecayTime = 8000.0	; scent decay time
initialNTRtype = 1	; initian next time time reset type: 0 - same as regular, 1 - random at (0, timedResetMeanTime)

[Home]
homeType = 2	; home type: 1 - parabolic potential, 2 - conical potential
homeRadius = 0.0	; radius of the circular area at the origin called 'home'
homePotentialKT = 0	; strength of the home potential, translational strength
homePotentialKR = 0.3	; strength of the home potential, rotational strength

[TimedReset]
timedResetTimerType = 0	; regular time interval
timedResetType = 0	; timed reset type
timedResetMeanTime = 8.0	; average time between timed resets
timedResetHomePotential = 0	; does timed reset switches on home potential sensing

[Boundary]
boundaryResetType = 0	; boundary reset type
betaBoundaryMult = 1	; beta multiplication coefficient when particle hits boundary
boundaryResetSRtime = 0	; is boundary hit resets stochastic reset time or not
boundaryHomePotential = 0	; does boundary hit switches on home potential sensing

[TargetList]
targetNtargets = 2	; number of targets

[Target1]
targetDistanceMin = 4.0	;
targetDistanceMax = 4.0	;
targetAngleMin = 0.0	; degrees
targetAngleMax = 0.0	; degrees
targetRadiusMin = 1.0	;
targetRadiusMax = 1.0	;
targetWeightMin = 100000	;
targetWeightMax = 100000	;
targetAppearType = 0	; 0 - appear by time, 1 - appear after termination
targetAppearTime = 0.0	;
targetAppearDelay = 0.0	;
targetTerminateType = 0	; 0 - terminate by time, 1 - terminate after capture
targetTerminateTime = 10000000.0	;
targetResetType = 2	; 
betaTargetMultMin = 100.0	; beta multiplication coefficient when particle hits target
betaTargetMultMax = 100.0	; beta multiplication coefficient when particle hits target
targetResetSRtime = 0	; is target hit resets stochastic reset time or not
targetHomePotential = 0	; does target hit switches on home potential sensing

[Target2]
targetDistanceMin = 4.0	;
targetDistanceMax = 4.0	;
targetAngleMin = 180.0	; degrees
targetAngleMax = 180.0	; degrees
targetRadiusMin = 1.0	;
targetRadiusMax = 1.0	;
targetWeightMin = 100000	;
targetWeightMax = 100000	;
targetAppearType = 0	; 0 - appear by time, 1 - appear after termination
targetAppearTime = 0.0	;
targetAppearDelay = 0.0	;
targetTerminateType = 0	; 0 - terminate by time, 1 - terminate after capture
targetTerminateTime = 10000000.0	;
targetResetType = 2	; 
betaTargetMultMin = 10.0	; beta multiplication coefficient when particle hits target
betaTargetMultMax = 10.0	; beta multiplication coefficient when particle hits target
targetResetSRtime = 0	; is target hit resets stochastic reset time or not
targetHomePotential = 0	; does target hit switches on home potential sensing

[Computations]
latticeSize = 16000	; number of nodes on each side of the grid
timeStep = 0.0025	; length of time step
Rscent_cutoffMultiplier = 20.0	; scent radius cutoff multiplier
scentDecayRescalingNsteps = 25000	; number of steps between inflation rescaling
gpuHistoryLength = 1000	; number of steps stored on GPU before it's flushed to CPU and analyzed

[Run]
nSteps = 100000	; total number of time steps in each iteration
nIterations = 64	; total number of iterations

[Mode]
mode = chiRot_chiTrans	; 
chiRot_range = 0.20	;
chiTrans_range = 0.010	;

[Output]
cumulativeDataMinTime = 0.0	; minimum time after which all cumulative data to be collected
cumulativePCblockSize = 8	; block size for the cumulative particle concentration
PCReg_window = 20000000	; 
PCReg_blockSize = 8	; 
SCReg_window = 20000000	; 
SCReg_blockSize = 8	; 
stepDrHistogram_min = 0	; limits of step dr histogram
stepDrHistogram_max = 0.02	; limits of step dr histogram
stepDrHistogram_nbins = 400	; number of bins in dtep dr histogram
totalScentReg_window = 4000000	; regular time total scent will be averaged inside window in each iteration, in steps
totalScentReg_avgperiod = 4000000	; regular time total scent will be averaged with this period in each iteration, in steps
PCrtheta_r_nbins = 32	; number of bins in rtheta PC hist over radius
PCrtheta_theta_binsize = 0.1	; linear size of bins in rtheta PC hist over theta
PCrthetaReg_window = 20000000	; regular time rtheta PC will be accumulated inside window in each iteration, in steps
PCtheta_nbins = 360	; number of bins in theta PC hist
PCtheta_rmin = 3.0	; r threshold after which particles participates in theta PC hist
PCtheta_rmax = 3.5	; r threshold after which particles participates in theta PC hist
PCthetaReg_window = 20000000	; regular time theta PC will be accumulated inside window in each iteration, in steps
HitCountReg_window = 100	; regular time interval at which hit counts are stored, in steps
NTrj = 0	; 
EveryTrj = 100	; 
computeMSD = 1	; Compute MSD of the trajectories
maxMSDLength = 800	; length of MSD output range
MSDstep = 20	; step count between the nearest MSD points
PRH_min = 0.0	; limits of path-rotation histogram
PRH_max = 8.0	; limits of path-rotation histogram
PRH_nbins = 80	; number of bins in path-rotation histogram
PRH_step = 20	; step between the nearest points for PRH
GTFPT_blockSize = 32	; block size for GT FPT collection
GTFPT_Rtarget = 0.001	; GT FPT target radius vector

